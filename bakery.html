
<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    .btn-king {
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
    }
    .btn-king:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(13, 110, 253, 0.4);
    }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
  
  <h2 class="text-center mb-4 fw-bold text-primary">Our Fresh Cakes</h2>
  
  <div class="row g-4">
    
    <!-- Card 1: Chocolate -->
    <div class="col-12 col-md-4">
      <div class="card shadow border-0 rounded-4 h-100">
        <img src="files/chocolate.jpeg" class="card-img-top rounded-top-4" style="height:220px; object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title fw-bold">Chocolate Cake</h5>
          <p class="text-muted fs-5">$25</p>
          <button class="btn btn-primary rounded-pill fw-bold btn-king px-4">Order Now</button>
        </div>
      </div>
    </div>
    
    <!-- Card 2: Vanilla -->
    <div class="col-12 col-md-4">
      <div class="card shadow border-0 rounded-4 h-100">
        <img src="files/vanila.jpeg" class="card-img-top rounded-top-4" style="height:220px; object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title fw-bold">Vanilla Cake</h5>
          <p class="text-muted fs-5">$22</p>
          <button class="btn btn-primary rounded-pill fw-bold btn-king px-4">Order Now</button>
        </div>
      </div>
    </div>
    
    <!-- Card 3: Strawberry -->
    <div class="col-12 col-md-4">
      <div class="card shadow border-0 rounded-4 h-100">
        <img src="files/strawberry.jpeg" class="card-img-top rounded-top-4" style="height:220px; object-fit:cover;">
        <div class="card-body text-center">
          <h5 class="card-title fw-bold">Strawberry Cake</h5>
          <p class="text-muted fs-5">$28</p>
          <button class="btn btn-primary rounded-pill fw-bold btn-king px-4">Order Now</button>
        </div>
      </div>
    </div>
    
  </div>
</div>
